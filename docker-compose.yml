
services:
  backend:
    build: ./backend
    container_name: saas-o-matic-backend
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data # Solo datos persistentes
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production # Cambiar a producción
      - DATABASE_URL=sqlite:////app/data/saas-o-matic.db
      - CORS_ORIGINS=http://localhost # Cambiar para producción
      - PYTHONUNBUFFERED=1
    restart: always
    networks:
      - saas-network

  frontend:
    build: ./frontend
    container_name: saas-o-matic-frontend
    ports:
      - "80:80" # Puerto 80 para producción
    depends_on:
      - backend
    restart: always
    networks:
      - saas-network

  db-viewer:
    image: coleifer/sqlite-web
    container_name: saas-o-matic-db-viewer
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    command: sqlite_web -H 0.0.0.0 -x /data/saas-o-matic.db
    depends_on:
      - backend
    restart: always
    networks:
      - saas-network

networks:
  saas-network:
    driver: bridge
